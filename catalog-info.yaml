# Declare your Buildkite pipelines below
---
# yaml-language-server: $schema=https://gist.githubusercontent.com/elasticmachine/988b80dae436cafea07d9a4a460a011d/raw/rre.schema.json
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: buildkite-pipeline-gh-cli-buildkite-plugin
  description: Buildkite Pipeline for gh-cli-buildkite-plugin
  links:
    - title: Pipeline
      url: https://buildkite.com/elastic/gh-cli-buildkite-plugin

spec:
  type: buildkite-pipeline
  owner: group:observablt-ci
  system: buildkite
  implementation:
    apiVersion: buildkite.elastic.dev/v1
    kind: Pipeline
    metadata:
      name: gh-cli-buildkite-plugin
      description: GitHub CLI Buildkite Plugin
    spec:
      repository: elastic/gh-cli-buildkite-plugin
      pipeline_file: ".buildkite/pipeline.yml"
      provider_settings:
        build_pull_request_forks: true
      teams:
        observablt-ci:
          access_level: MANAGE_BUILD_AND_READ
        everyone:
          access_level: READ_ONLY
